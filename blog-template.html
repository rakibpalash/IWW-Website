<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{BLOG_TITLE}} | Insta Web Works</title>
  <meta name="description" content="{{BLOG_EXCERPT}}">
  <meta property="og:title" content="{{BLOG_TITLE}}">
  <meta property="og:description" content="{{BLOG_EXCERPT}}">
  <meta property="og:image" content="{{BLOG_IMAGE}}">
  <meta property="og:type" content="article">
  <meta property="article:published_time" content="{{BLOG_DATE}}">
  <meta property="article:author" content="Insta Web Works Editorial Team">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/assets/css/variables.css">
  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/typography.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/pages.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
  <link rel="canonical" href="https://instawebworks.com.au/blog/{{BLOG_SLUG}}/">
  <meta name="robots" content="index, follow">
  <style>
    .blog-content-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 0;
    }
    .blog-content-wrapper h2 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-top: 2.5rem;
      margin-bottom: 1rem;
      color: var(--color-text-primary);
      scroll-margin-top: 100px;
    }
    .blog-content-wrapper h3 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
      color: var(--color-text-primary);
    }
    .blog-content-wrapper p {
      line-height: 1.8;
      margin-bottom: 1.5rem;
      color: var(--color-text-secondary);
    }
    .blog-content-wrapper ul, .blog-content-wrapper ol {
      margin: 1.5rem 0;
      padding-left: 2rem;
    }
    .blog-content-wrapper li {
      margin-bottom: 0.75rem;
      line-height: 1.7;
      color: var(--color-text-secondary);
    }
    .blog-content-wrapper a {
      color: var(--color-primary);
      text-decoration: underline;
      transition: color 0.2s;
    }
    .blog-content-wrapper a:hover {
      color: var(--color-primary-dark);
    }
    .blog-content-wrapper blockquote {
      border-left: 4px solid var(--color-primary);
      padding: 1.5rem 2rem;
      margin: 2rem 0;
      background: var(--color-bg-tertiary);
      border-radius: 0 8px 8px 0;
      font-style: italic;
      color: var(--color-text-primary);
    }
    .blog-content-wrapper pre {
      background: var(--color-bg-secondary);
      padding: 1.5rem;
      border-radius: 8px;
      overflow-x: auto;
      margin: 2rem 0;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
    }
    .blog-content-wrapper code {
      background: var(--color-bg-secondary);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 0.9em;
    }
    .blog-content-wrapper table {
      width: 100%;
      border-collapse: collapse;
      margin: 2rem 0;
      background: var(--color-bg-primary);
      border-radius: 8px;
      overflow: hidden;
    }
    .blog-content-wrapper th {
      background: var(--color-primary);
      color: white;
      padding: 1rem;
      text-align: left;
      font-weight: 600;
    }
    .blog-content-wrapper td {
      padding: 1rem;
      border-bottom: 1px solid var(--color-border);
      color: var(--color-text-secondary);
    }
    .blog-content-wrapper tr:last-child td {
      border-bottom: none;
    }
    .blog-content-wrapper .box, .blog-content-wrapper .callout, .blog-content-wrapper .success {
      padding: 1.5rem 2rem;
      margin: 2rem 0;
      border-radius: 8px;
      background: var(--color-bg-tertiary);
      border-left: 4px solid var(--color-primary);
    }
    .blog-content-wrapper .success {
      border-left-color: #10b981;
      background: rgba(16, 185, 129, 0.1);
    }
    .blog-content-wrapper .quick-nav {
      background: var(--color-bg-secondary);
      padding: 2rem;
      border-radius: 8px;
      margin: 2rem 0;
    }
    .blog-content-wrapper .quick-nav ul {
      list-style: none;
      padding: 0;
      margin: 1rem 0 0 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 0.75rem;
    }
    .blog-content-wrapper .quick-nav a {
      color: var(--color-text-primary);
      text-decoration: none;
      display: block;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .blog-content-wrapper .quick-nav a:hover {
      background: var(--color-bg-tertiary);
    }
    .blog-content-wrapper img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin: 2rem 0;
    }
    .blog-meta {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      margin-top: 1rem;
      flex-wrap: wrap;
    }
    .blog-meta-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--color-text-muted);
      font-size: 0.9rem;
    }
    .blog-meta-item i {
      color: var(--color-primary);
    }
    .blog-tags {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid var(--color-border);
    }
    .blog-tag {
      background: var(--color-bg-secondary);
      color: var(--color-text-primary);
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      text-decoration: none;
      transition: background 0.2s;
    }
    .blog-tag:hover {
      background: var(--color-primary);
      color: white;
    }
    .share-buttons {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }
    .share-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.2rem;
      transition: transform 0.2s, opacity 0.2s;
      text-decoration: none;
    }
    .share-btn:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }
    .share-btn.facebook { background: #1877f2; }
    .share-btn.twitter { background: #000; }
    .share-btn.linkedin { background: #0077b5; }
    .share-btn.whatsapp { background: #25d366; }
  </style>
</head>
<body class="site-shell">
  <a class="skip-link" href="#main-content">Skip to content</a>
  <div data-component="header"></div>
  <main id="main-content">
    <!-- Blog Header -->
    <section class="page-banner">
      <div class="container-wide">
        <div class="page-banner-card stack-md">
          <nav class="breadcrumb" aria-label="Breadcrumb">
            <a href="/index.html">Home</a>
            <span>/</span>
            <a href="/blog.html">Blog</a>
            <span>/</span>
            <span class="current">{{BLOG_TITLE}}</span>
          </nav>
          <span class="section-eyebrow">{{BLOG_CATEGORY}}</span>
          <h1>{{BLOG_TITLE}}</h1>
          <p class="lead">{{BLOG_EXCERPT}}</p>
          <div class="blog-meta">
            <div class="blog-meta-item">
              <i class="fas fa-user"></i>
              <span>Insta Web Works Editorial Team</span>
            </div>
            <div class="blog-meta-item">
              <i class="fas fa-calendar"></i>
              <span>{{BLOG_DATE}}</span>
            </div>
            <div class="blog-meta-item">
              <i class="fas fa-clock"></i>
              <span>10 min read</span>
            </div>
            <div class="blog-meta-item">
              <i class="fas fa-tag"></i>
              <span>{{BLOG_SOURCE}}</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Featured Image -->
    <section class="section-sm">
      <div class="container-wide article-hero-image">
        <img src="{{BLOG_IMAGE}}" alt="{{BLOG_TITLE}}" loading="lazy">
      </div>
    </section>

    <!-- Blog Content -->
    <section class="section">
      <div class="container-wide content-grid">
        <article class="blog-content-wrapper">
          {{BLOG_CONTENT}}
        </article>
        
        <!-- Sidebar with Table of Contents -->
        <aside class="sidebar surface stack-md">
          <h3>Table of Contents</h3>
          <nav class="toc" aria-label="Table of contents" id="toc">
            <!-- Auto-generated from H2 headings -->
          </nav>
          
          <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--color-border);">
            <h4>Share this article</h4>
            <div class="share-buttons">
              <a href="https://www.facebook.com/sharer/sharer.php?u={{BLOG_URL}}" class="share-btn facebook" target="_blank" rel="noopener" aria-label="Share on Facebook">
                <i class="fab fa-facebook-f"></i>
              </a>
              <a href="https://twitter.com/intent/tweet?url={{BLOG_URL}}&text={{BLOG_TITLE}}" class="share-btn twitter" target="_blank" rel="noopener" aria-label="Share on Twitter">
                <i class="fab fa-twitter"></i>
              </a>
              <a href="https://www.linkedin.com/shareArticle?mini=true&url={{BLOG_URL}}&title={{BLOG_TITLE}}" class="share-btn linkedin" target="_blank" rel="noopener" aria-label="Share on LinkedIn">
                <i class="fab fa-linkedin-in"></i>
              </a>
              <a href="https://wa.me/?text={{BLOG_TITLE}}%20{{BLOG_URL}}" class="share-btn whatsapp" target="_blank" rel="noopener" aria-label="Share on WhatsApp">
                <i class="fab fa-whatsapp"></i>
              </a>
            </div>
          </div>
        </aside>
      </div>
    </section>

    <!-- CTA Section -->
    <section class="section-sm">
      <div class="container-wide" data-component="cta-section"></div>
    </section>

    <!-- Related Blogs -->
    <section class="section">
      <div class="container-wide">
        <div class="section-header">
          <div class="section-heading stack-md">
            <span class="section-eyebrow">Related Articles</span>
            <h2>Continue exploring more insights</h2>
          </div>
        </div>
        <div class="grid grid-3" data-render="relatedBlogs"></div>
      </div>
    </section>
  </main>
  <div data-component="footer"></div>
  
  <script type="module">
    // Auto-generate table of contents from H2 headings
    document.addEventListener('DOMContentLoaded', () => {
      const content = document.querySelector('.blog-content-wrapper');
      const toc = document.getElementById('toc');
      
      if (!content || !toc) return;
      
      const headings = content.querySelectorAll('h2, h3');
      if (headings.length === 0) {
        toc.parentElement.style.display = 'none';
        return;
      }
      
      const tocHTML = Array.from(headings).map((heading, index) => {
        const id = heading.id || `heading-${index}`;
        heading.id = id;
        const level = heading.tagName === 'H2' ? 'main' : 'sub';
        const style = level === 'sub' ? 'padding-left: 1rem; font-size: 0.9em;' : '';
        return `<a href="#${id}" style="${style}">${heading.textContent}</a>`;
      }).join('');
      
      toc.innerHTML = tocHTML;
      
      // Update current year in footer
      document.querySelectorAll('[data-current-year]').forEach(el => {
        el.textContent = new Date().getFullYear();
      });
    });
  </script>
  <script type="module" src="/assets/js/main.js"></script>
</body>
</html>
